            accent: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' },
          }
        }

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script>
    var h = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;

    // ─── Supabase 初始化 ───
    // 优先读取 js/supabase-config.js（Netlify 构建时生成）
    // 加载失败则使用默认值兜底
    var SUPABASE_URL = window.SUPABASE_URL || 'https://ttlplvlefvqixcedskat.supabase.co';
    var SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'sb_publishable_xCoCP3NC6gkD5nLEn8wfBw_yjmMg9xK';
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ─── 科目列表 ───
    var SUBJECTS = ['全部', '数学', '英语', '物理', '化学', '生物', '语文', '历史', '地理', '政治'];
    var GRADE_LEVELS = ['全部', '小学', '初中', '高中'];

    var FEATURES = [
      { icon: '🎯', title: '精准匹配', desc: 'AI智能分析学生学情，精准推荐最适合的导师，让每一分钱都花在刀刃上。' },
      { icon: '🛡️', title: '品质保障', desc: '所有导师均经过5轮严格筛选与背景审核，教学满意度高达98.7%。' },
      { icon: '📊', title: '效果追踪', desc: '实时学习报告与阶段性测评，家长随时掌握孩子进步轨迹。' },
    ];

    // ─── Icon Components ───
    function MenuIcon() {
      return h('svg', { width: 24, height: 24, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
        h('line', { x1: '4', x2: '20', y1: '12', y2: '12' }),
        h('line', { x1: '4', x2: '20', y1: '6', y2: '6' }),
        h('line', { x1: '4', x2: '20', y1: '18', y2: '18' })
      );
    }
    function XIcon() {
      return h('svg', { width: 24, height: 24, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
        h('path', { d: 'M18 6 6 18' }),
        h('path', { d: 'm6 6 12 12' })
      );
    }
    function SearchIcon() {
      return h('svg', { width: 20, height: 20, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
        h('circle', { cx: '11', cy: '11', r: '8' }),
        h('path', { d: 'm21 21-4.3-4.3' })
      );
    }
    function StarIcon(props) {
      return h('svg', { width: 14, height: 14, viewBox: '0 0 24 24', fill: props.filled ? '#f97316' : 'none', stroke: '#f97316', strokeWidth: 2 },
        h('polygon', { points: '12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2' })
      );
    }
    function CheckCircleIcon() {
      return h('svg', { width: 64, height: 64, viewBox: '0 0 24 24', fill: 'none', stroke: '#22c55e', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
        h('path', { d: 'M22 11.08V12a10 10 0 1 1-5.93-9.14' }),
        h('path', { d: 'm9 11 3 3L22 4' })
      );
    }
    function LoadingIcon() {
      return h('svg', { className: 'animate-spin', width: 24, height: 24, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
        h('path', { d: 'M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83' })
      );
    }

    // ─── 支付弹窗 ───
    function PaymentModal(props) {
      var isOpen = props.isOpen;
      var onClose = props.onClose;
      var bookingInfo = props.bookingInfo;
      var bookingId = bookingInfo ? bookingInfo.bookingId : null;

      var submittedState = useState(false);
      var submitted = submittedState[0];
      var setSubmitted = submittedState[1];

      var submittingState = useState(false);
      var submitting = submittingState[0];
      var setSubmitting = submittingState[1];

      // 截图上传相关状态
      var screenshotUrlState = useState(null);
      var screenshotUrl = screenshotUrlState[0];
      var setScreenshotUrl = screenshotUrlState[1];

      var uploadingState = useState(false);
      var uploading = uploadingState[0];
      var setUploading = uploadingState[1];

      var uploadErrorState = useState('');
      var uploadError = uploadErrorState[0];
      var setUploadError = uploadErrorState[1];

      if (!isOpen) return null;

      // 处理文件选择和上传
      var handleFileChange = async function(e) {
        var file = e.target.files[0];
        if (!file) return;

        // 校验文件类型
        if (!file.type.match(/^image\/(jpeg|png|webp)$/)) {
          setUploadError('仅支持 JPG、PNG、WebP 格式的图片');
          return;
        }

        // 校验文件大小（5MB）
        if (file.size > 5 * 1024 * 1024) {
          setUploadError('图片大小不能超过 5MB');
          return;
        }

        setUploadError('');
        setUploading(true);

        try {
          // 生成带时间戳的文件名防止重名
          var timestamp = Date.now();
          var ext = file.name.split('.').pop();
          var fileName = 'proof_' + timestamp + '.' + ext;

          // 上传到 Supabase Storage
          var uploadResult = await supabase.storage
            .from('payment-proofs')
            .upload(fileName, file, {
              cacheControl: '3600',
              upsert: false
            });

          if (uploadResult.error) {
            // 桶不存在时给明确提示
            if (uploadResult.error.message && uploadResult.error.message.indexOf('not found') !== -1) {
              setUploadError('存储服务未配置，请联系管理员在 Supabase 创建 payment-proofs 存储桶');
            } else {
              setUploadError('上传失败：' + uploadResult.error.message);
            }
            setUploading(false);
            return;
          }

          // 获取公开访问 URL
          var urlResult = supabase.storage
            .from('payment-proofs')
            .getPublicUrl(fileName);

          if (urlResult.data && urlResult.data.publicUrl) {
            setScreenshotUrl(urlResult.data.publicUrl);
          } else {
            setUploadError('获取图片地址失败，请重试');
            setUploading(false);
            return;
          }

          setUploading(false);
        } catch (err) {
          setUploadError('上传失败，请检查网络后重试');
          setUploading(false);
        }
      };

      var handlePaymentConfirm = async function() {
        if (!bookingId) {
          alert('预约信息丢失，请刷新页面重试');
          return;
        }
        if (!screenshotUrl) {
          alert('请先上传支付截图');
          return;
        }
        setSubmitting(true);
        try {
          var updateData = { payment_status: 'submitted' };
          // 如果有截图，一起提交
          if (screenshotUrl) {
            updateData.payment_screenshot_url = screenshotUrl;
          }

          var result = await supabase
            .from('bookings')
            .update(updateData)
            .eq('id', bookingId);

          if (result.error) {
            alert('提交失败：' + result.error.message);
            setSubmitting(false);
            return;
          }
          setSubmitted(true);
          setSubmitting(false);
        } catch (err) {
          alert('网络错误，请稍后重试');
          setSubmitting(false);
        }
      };

      var handleClose = function() {
        setSubmitted(false);
        setScreenshotUrl(null);
        setUploadError('');
        onClose();
      };

      if (submitted) {
        // 支付已确认
        return h('div', { className: 'modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4', style: { backgroundColor: 'rgba(0,0,0,0.5)' }, onClick: handleClose },
          h('div', { className: 'modal-content bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden', onClick: function(e) { e.stopPropagation(); } },
            h('div', { className: 'p-6 text-center' },
              h('div', { className: 'flex justify-center mb-4' },
                h('svg', { width: 56, height: 56, viewBox: '0 0 24 24', fill: 'none', stroke: '#10B981', strokeWidth: 2 },
                  h('path', { d: 'M22 11.08V12a10 10 0 1 1-5.93-9.14' }),
                  h('polyline', { points: '22 4 12 14.01 9 11.01' })
                )
              ),
              h('h3', { className: 'text-2xl font-bold text-gray-900 mb-2' }, '提交成功，待管理员确认'),
              h('p', { className: 'text-gray-500 mb-1 text-sm' }, '请等待管理员核对收款记录后确认'),
              h('p', { className: 'text-gray-400 mb-6 text-xs' }, '确认后我们将在24小时内联系您安排课程'),
              h('button', { onClick: handleClose, className: 'w-full py-3 bg-primary-600 text-white rounded-xl font-semibold hover:bg-primary-700 transition-colors' }, '我知道了')
            )
          )
        );
      }

      return h('div', { className: 'modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4', style: { backgroundColor: 'rgba(0,0,0,0.5)' }, onClick: handleClose },
        h('div', { className: 'modal-content bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden', onClick: function(e) { e.stopPropagation(); } },
          h('div', { className: 'p-6 text-center' },
            h('div', { className: 'flex justify-center mb-4' }, h(CheckCircleIcon)),
            h('h3', { className: 'text-2xl font-bold text-gray-900 mb-2' }, '预约成功！'),
            h('p', { className: 'text-gray-500 mb-4 text-sm' },
              bookingInfo && bookingInfo.tutorName
                ? '已为您预约 ' + bookingInfo.tutorName + ' 老师的试听课'
                : '已成功提交预约信息'
            ),
            // 支付码区域
            h('div', { className: 'bg-gray-50 rounded-xl p-4 mb-4' },
              // 固定金额
              bookingInfo && bookingInfo.hourlyRate ? h('div', { className: 'mb-3 bg-accent-50 border border-accent-200 rounded-xl p-3' },
                h('p', { className: 'text-xs text-accent-600 mb-1 font-medium' }, '应付金额（固定）'),
                h('p', { className: 'text-3xl font-extrabold text-accent-600' }, '¥' + bookingInfo.hourlyRate),
                h('p', { className: 'text-xs text-accent-500 mt-1' }, bookingInfo.tutorName + ' 老师 · ' + (bookingInfo.subject || '') + ' · 试听课1课时'),
                h('p', { className: 'text-xs text-red-500 mt-1 font-medium' }, '⚠️ 请按此金额支付，否则影响审核')
              ) : null,
              h('p', { className: 'text-sm text-gray-600 mb-2 font-medium' }, '微信扫码支付'),
              h('div', { className: 'w-48 h-48 mx-auto bg-white rounded-lg flex items-center justify-center overflow-hidden border-2 border-gray-200' },
                h('img', { src: 'qrcode.jpg', alt: '微信收款码', className: 'w-full h-full object-contain' })
              ),
              h('p', { className: 'text-xs text-gray-400 mt-2' }, '请使用微信扫描上方二维码完成支付'),

              // ─── 上传支付截图 ───
              h('div', { className: 'mt-3 pt-3 border-t border-gray-200' },
                h('p', { className: 'text-xs text-gray-500 mb-2' }, '📸 请上传支付截图（必填）'),

                // 文件选择按钮
                h('label', { className: 'inline-block px-4 py-2 bg-white border border-gray-300 rounded-lg text-xs text-gray-600 cursor-pointer hover:bg-gray-50 transition-colors' },
                  uploading ? '上传中...' : screenshotUrl ? '📎 重新选择' : '📎 选择截图',
                  h('input', { type: 'file', accept: 'image/jpeg,image/png,image/webp', onChange: handleFileChange,
                    className: 'hidden',
                    disabled: uploading
                  })
                ),

                // 上传错误提示
                uploadError ? h('p', { className: 'text-red-500 text-xs mt-1' }, uploadError) : null,

                // 上传成功预览
                screenshotUrl ? h('div', { className: 'mt-2' },
                  h('img', { src: screenshotUrl, alt: '支付截图', className: 'w-24 h-24 mx-auto rounded-lg object-cover border border-gray-200' }),
                  h('p', { className: 'text-green-600 text-xs mt-1' }, '✅ 截图已上传')
                ) : null
              )
            ),
            // ─── 确认支付按钮 ───
            h('button', {
              onClick: handlePaymentConfirm,
              disabled: submitting || !screenshotUrl,
              title: !screenshotUrl ? '请先上传支付截图' : '',
              className: 'w-full py-3 mb-2 rounded-xl font-semibold transition-colors disabled:opacity-50 ' + (screenshotUrl ? 'bg-green-500 text-white hover:bg-green-600' : 'bg-gray-300 text-gray-500 cursor-not-allowed')
            }, submitting ? '提交中...' : screenshotUrl ? '✅ 我已完成支付，通知后台' : '请先上传支付截图'),
            h('button', { onClick: handleClose, className: 'w-full py-2.5 text-sm text-gray-400 hover:text-gray-600 transition-colors' }, '稍后支付')
          )
        )
      );
    }

    // ─── 顾客登录/注册弹窗 ───
    function CustomerAuthModal(props) {
      var isOpen = props.isOpen;
      var onClose = props.onClose;
      var onLogin = props.onLogin;

      var emailState = useState('');
      var email = emailState[0];
      var setEmail = emailState[1];
      var passState = useState('');
      var password = passState[0];
      var setPassword = passState[1];
      var errorState = useState('');
      var error = errorState[0];
      var setError = errorState[1];
      var successState = useState('');
      var success = successState[0];
      var setSuccess = successState[1];
      var loadingState = useState(false);
      var loading = loadingState[0];
      var setLoading = loadingState[1];
      var isSignUpState = useState(false);
      var isSignUp = isSignUpState[0];
      var setIsSignUp = isSignUpState[1];

      if (!isOpen) return null;

      var handleLogin = async function(e) {
        e.preventDefault();
        setError('');
        setSuccess('');
        setLoading(true);
        try {
          var result = await supabase.auth.signInWithPassword({ email: email, password: password });
          if (result.error) {
            setError(result.error.message);
            setLoading(false);
          } else {
            onLogin(result.data.user);
            onClose();
          }
        } catch (err) {
          setError('网络错误，请稍后重试');
          setLoading(false);
        }
      };

      var handleSignUp = async function(e) {
        e.preventDefault();
        setError('');
        setSuccess('');
        if (password.length < 6) {
          setError('密码至少需要6个字符');
          return;
        }
        setLoading(true);
        try {
          var result = await supabase.auth.signUp({ email: email, password: password });
          if (result.error) {
            setError(result.error.message);
            setLoading(false);
          } else {
            if (result.data.user && result.data.session) {
              // 邮箱确认未开启，直接登录
              onLogin(result.data.user);
              onClose();
            } else {
              setSuccess('注册成功！请检查邮箱确认链接，或直接切换到登录');
              setLoading(false);
            }
          }
        } catch (err) {
          setError('网络错误，请稍后重试');
          setLoading(false);
        }
      };

      var switchMode = function() {
        setIsSignUp(!isSignUp);
        setError('');
        setSuccess('');
      };

      return h('div', { className: 'modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4', style: { backgroundColor: 'rgba(0,0,0,0.5)' }, onClick: onClose },
        h('div', { className: 'modal-content bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden', onClick: function(e) { e.stopPropagation(); } },
          h('div', { className: 'p-6' },
            h('div', { className: 'text-center mb-6' },
              h('div', { className: 'w-12 h-12 rounded-xl bg-gradient-to-br from-primary-600 to-primary-700 flex items-center justify-center mx-auto mb-3' },
                h('span', { className: 'text-white font-bold text-xl' }, '优')
              ),
              h('h3', { className: 'text-xl font-bold text-gray-900' }, isSignUp ? '注册账号' : '登录账号'),
              h('p', { className: 'text-sm text-gray-500 mt-1' }, isSignUp ? '注册后可查看预约记录' : '登录查看您的预约记录')
            ),
            h('form', { onSubmit: isSignUp ? handleSignUp : handleLogin, className: 'space-y-3' },
              h('div', null,
                h('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, '邮箱'),
                h('input', { type: 'email', value: email, onChange: function(e) { setEmail(e.target.value); }, placeholder: 'your@email.com', required: true,
                  className: 'w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition-all' })
              ),
              h('div', null,
                h('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, '密码'),
                h('input', { type: 'password', value: password, onChange: function(e) { setPassword(e.target.value); }, placeholder: isSignUp ? '至少6个字符' : '请输入密码', required: true,
                  className: 'w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition-all' })
              ),
              error ? h('p', { className: 'text-red-500 text-sm bg-red-50 p-2 rounded-lg' }, error) : null,
              success ? h('p', { className: 'text-green-600 text-sm bg-green-50 p-2 rounded-lg' }, success) : null,
              h('button', { type: 'submit', disabled: loading,
                className: 'w-full py-2.5 bg-primary-600 text-white rounded-xl font-semibold hover:bg-primary-700 transition-colors disabled:opacity-60' },
                loading ? (isSignUp ? '注册中...' : '登录中...') : (isSignUp ? '注册' : '登录')
              )
            ),
            h('div', { className: 'mt-4 text-center' },
              h('button', { onClick: switchMode, className: 'text-sm text-primary-600 hover:text-primary-700 transition-colors' },
                isSignUp ? '已有账号？去登录' : '没有账号？注册一个'
              )
            )
          )
        )
      );
    }

    // ─── 我的预约弹窗 ───
    function MyBookingsModal(props) {
      var isOpen = props.isOpen;
      var onClose = props.onClose;
      var user = props.user;

      var phoneState = useState(user ? user.email : '');
      var lookupPhone = phoneState[0];
      var setLookupPhone = phoneState[1];

      var bookingsState = useState([]);
      var bookings = bookingsState[0];
      var setBookings = bookingsState[1];
      var loadingState = useState(false);
      var loading = loadingState[0];
      var setLoading = loadingState[1];
      var searchedState = useState(false);
      var searched = searchedState[0];
      var setSearched = searchedState[1];
      var errorState = useState('');
      var error = errorState[0];
      var setError = errorState[1];

      var handleSearch = async function(e) {
        e.preventDefault();
        if (!lookupPhone.trim()) {
          setError('请输入预约时填写的手机号');
          return;
        }
        setError('');
        setLoading(true);
        setSearched(true);
        try {
          // 通过 RPC 函数安全查询（不暴露手机号和支付截图）
          var result = await supabase.rpc('lookup_bookings_by_phone', {
            p_phone: lookupPhone.trim()
          });
          if (result.data) setBookings(result.data);
          if (result.error) setError(result.error.message);
        } catch (err) {
          setError('查询失败，请稍后重试');
        }
        setLoading(false);
      };

      if (!isOpen) return null;

      var statusLabels = { pending: '待确认', confirmed: '已确认', completed: '已完成', cancelled: '已取消' };
      var paymentLabels = { unpaid: '未支付', submitted: '待确认', paid: '已确认收款' };
      var statusColors = { pending: 'bg-yellow-100 text-yellow-700', confirmed: 'bg-blue-100 text-blue-700', completed: 'bg-green-100 text-green-700', cancelled: 'bg-gray-100 text-gray-500' };
      var paymentColors = { unpaid: 'bg-red-100 text-red-600', submitted: 'bg-orange-100 text-orange-600', paid: 'bg-green-100 text-green-600' };

      return h('div', { className: 'modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4', style: { backgroundColor: 'rgba(0,0,0,0.5)' }, onClick: onClose },

    // ─── Booking Modal ───
    function BookingModal(props) {
      var isOpen = props.isOpen;
      var onClose = props.onClose;
      var tutor = props.tutor;
      var onBookingSuccess = props.onBookingSuccess;

      var formState = useState({ name: '', phone: '', grade: '', demand: '' });
      var form = formState[0];
      var setForm = formState[1];

      var errorsState = useState({});
      var errors = errorsState[0];
      var setErrors = errorsState[1];

      var loadingState = useState(false);
      var loading = loadingState[0];
      var setLoading = loadingState[1];

      if (!isOpen) return null;

      var validate = function() {
        var e = {};
        if (!form.name.trim()) e.name = '请输入姓名';
        if (!/^1[3-9]\d{9}$/.test(form.phone)) e.phone = '请输入有效手机号';
        if (!form.grade.trim()) e.grade = '请选择年级';
        return e;
      };

      var handleSubmit = async function(e) {
        e.preventDefault();
        var errs = validate();
        if (Object.keys(errs).length) { setErrors(errs); return; }
        setErrors({});
        setLoading(true);

        try {
          var bookingData = {
            student_name: form.name,
            phone: form.phone,
            grade: form.grade,
            demand: form.demand || null,
            tutor_id: tutor ? tutor.id : null,
            status: 'pending',
            payment_status: 'unpaid'
          };

          var result = await supabase.from('bookings').insert(bookingData).select();

          if (result.error) {
            alert('提交失败：' + result.error.message);
            setLoading(false);
            return;
          }

          // 成功
          var bookingId = result.data && result.data[0] ? result.data[0].id : null;

          // 保存预约 ID 到本地，方便后续查询（不依赖手机号）
          if (bookingId) {
            try {
              var savedBookings = JSON.parse(localStorage.getItem('youxuebang_bookings') || '[]');
              savedBookings.push({
                id: bookingId,
                phone: form.phone,
                time: new Date().toISOString(),
                tutorName: tutor ? tutor.name : null
              });
              if (savedBookings.length > 20) savedBookings = savedBookings.slice(-20);
              localStorage.setItem('youxuebang_bookings', JSON.stringify(savedBookings));
            } catch (e) { /* localStorage 不可用（隐私模式/配额满）则跳过 */ }
          }

          setForm({ name: '', phone: '', grade: '', demand: '' });
          setLoading(false);
          onClose();
          onBookingSuccess({ tutorName: tutor ? tutor.name : null, bookingId: bookingId, hourlyRate: tutor ? tutor.hourly_rate : null, subject: tutor ? tutor.subject : null });
        } catch (err) {
          alert('网络错误，请稍后重试');
          setLoading(false);
        }
      };

      var handleClose = function() {
        setForm({ name: '', phone: '', grade: '', demand: '' });
        setErrors({});
        onClose();
      };

      var handleChange = function(field, value) {
        setForm(function(prev) {
          var next = Object.assign({}, prev);
          next[field] = value;
          return next;
        });
        if (errors[field]) {
          setErrors(function(prev) {
            var next = Object.assign({}, prev);
            next[field] = undefined;
            return next;
          });
        }
      };

      return h('div', { className: 'modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-4', style: { backgroundColor: 'rgba(0,0,0,0.5)' }, onClick: handleClose },
        h('div', { className: 'modal-content bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden', onClick: function(e) { e.stopPropagation(); } },
          h('div', { className: 'flex items-center justify-between p-6 border-b border-gray-100' },
            h('div', null,
              h('h3', { className: 'text-xl font-bold text-gray-900' }, '预约试听课'),
              tutor ? h('p', { className: 'text-sm text-gray-500 mt-1' }, '预约导师：' + tutor.name + ' · ' + tutor.subject) : null
            ),
            h('button', { onClick: handleClose, className: 'p-2 hover:bg-gray-100 rounded-lg transition-colors text-gray-400 hover:text-gray-600' }, h(XIcon))
          ),
          h('form', { onSubmit: handleSubmit, className: 'p-6 space-y-4' },
            h('div', null,
              h('label', { className: 'block text-sm font-medium text-gray-700 mb-1.5' }, '学生姓名 ', h('span', { className: 'text-red-500' }, '*')),
              h('input', { type: 'text', value: form.name, onChange: function(e) { handleChange('name', e.target.value); }, placeholder: '请输入学生姓名',
                className: 'w-full px-4 py-3 border rounded-xl outline-none transition-all ' + (errors.name ? 'border-red-400 bg-red-50' : 'border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-100') }),
              errors.name ? h('p', { className: 'text-red-500 text-xs mt-1' }, errors.name) : null
            ),
            h('div', null,
              h('label', { className: 'block text-sm font-medium text-gray-700 mb-1.5' }, '联系电话 ', h('span', { className: 'text-red-500' }, '*')),
              h('input', { type: 'tel', value: form.phone, onChange: function(e) { handleChange('phone', e.target.value); }, placeholder: '请输入手机号码',
                className: 'w-full px-4 py-3 border rounded-xl outline-none transition-all ' + (errors.phone ? 'border-red-400 bg-red-50' : 'border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-100') }),
              errors.phone ? h('p', { className: 'text-red-500 text-xs mt-1' }, errors.phone) : null
            ),
            h('div', null,
              h('label', { className: 'block text-sm font-medium text-gray-700 mb-1.5' }, '年级 ', h('span', { className: 'text-red-500' }, '*')),
              h('select', { value: form.grade, onChange: function(e) { handleChange('grade', e.target.value); },
                className: 'w-full px-4 py-3 border rounded-xl outline-none transition-all appearance-none bg-white ' + (errors.grade ? 'border-red-400 bg-red-50' : 'border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-100') },
                h('option', { value: '' }, '请选择年级'),
                h('option', null, '小学三年级'), h('option', null, '小学四年级'), h('option', null, '小学五年级'), h('option', null, '小学六年级'),
                h('option', null, '初一'), h('option', null, '初二'), h('option', null, '初三'),
                h('option', null, '高一'), h('option', null, '高二'), h('option', null, '高三')
              ),
              errors.grade ? h('p', { className: 'text-red-500 text-xs mt-1' }, errors.grade) : null
            ),
            h('div', null,
              h('label', { className: 'block text-sm font-medium text-gray-700 mb-1.5' }, '学习诉求'),
              h('textarea', { value: form.demand, onChange: function(e) { handleChange('demand', e.target.value); }, rows: '3', placeholder: '请简要描述您的学习需求，例如：希望提高数学成绩...',
                className: 'w-full px-4 py-3 border border-gray-200 rounded-xl outline-none transition-all focus:border-primary-500 focus:ring-2 focus:ring-primary-100 resize-none' })
            ),
            h('button', { type: 'submit', disabled: loading,
              className: 'w-full py-3.5 bg-accent-500 text-white rounded-xl font-semibold hover:bg-accent-600 transition-all hover:shadow-lg hover:shadow-accent-200 active:scale-[0.98] disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2' },
              loading ? h('span', { className: 'flex items-center gap-2' }, h(LoadingIcon), '提交中...') : '提交预约'
            )
          )
        )
      );
    }

              user
                ? h('div', { className: 'space-y-2' },
                    h('button', { onClick: function() { onMyBookingsClick(); setMenuOpen(false); }, className: 'w-full py-3 bg-primary-50 text-primary-700 font-semibold rounded-xl border border-primary-200 hover:bg-primary-100 transition-colors' }, '📋 我的预约'),
                    h('div', { className: 'flex items-center justify-between px-2' },
                      h('p', { className: 'text-sm text-gray-500' }, '👤 ' + user.email),
                      h('button', { onClick: function() { onLogout(); setMenuOpen(false); }, className: 'text-sm text-red-500 font-medium hover:text-red-600' }, '退出')
                    )
                  )
                : h('button', { onClick: function() { openAuth(); setMenuOpen(false); }, className: 'w-full text-left px-4 py-3 text-gray-700 font-medium hover:bg-gray-50 rounded-xl cursor-pointer' }, '登录'),
              h('button', { onClick: function() { onBookClick(); setMenuOpen(false); }, className: 'w-full py-3 bg-accent-500 text-white rounded-xl font-semibold' }, '免费试听')
            )
          )
        ) : null,
        authModal
      );
    }

    // ─── Hero Section ───
    function HeroSection(props) {
      var onBookClick = props.onBookClick;
      var onSearch = props.onSearch;
      var user = props.user;
      var searchState = useState('');
      var searchText = searchState[0];
      var setSearchText = searchState[1];

      // 关键词 → 科目映射
      var KEYWORD_MAP = {
        '数学': '数学', '物理': '物理', '英语': '英语', '化学': '化学',
        '语文': '语文', '历史': '历史', '政治': '政治', '地理': '地理', '生物': '生物',
        '理科': ['数学', '物理', '化学', '生物'],
        '文科': ['语文', '英语', '历史', '政治', '地理']
      };

      var handleSearch = function() {
        var keyword = searchText.trim();
        if (!keyword) return;

        // 检查关键词映射
        var matched = null;
        Object.keys(KEYWORD_MAP).forEach(function(k) {
          if (keyword.indexOf(k) !== -1) {
            matched = KEYWORD_MAP[k];
          }
        });

        // 如果没匹配到映射，直接用搜索词
        if (!matched) matched = keyword;

        // 滚动到导师区域
        var el = document.getElementById('tutors');
        if (el) el.scrollIntoView({ behavior: 'smooth' });

        // 触发筛选
        if (onSearch) onSearch(matched);
      };

      var handleKeyDown = function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleSearch();
        }
      };

      var quickTags = [
        { label: '数学', keyword: '数学' },
        { label: '英语', keyword: '英语' },
        { label: '物理', keyword: '物理' },
        { label: '理科', keyword: '理科' }
      ];

      return h('section', { className: 'relative pt-32 pb-20 lg:pt-40 lg:pb-32 overflow-hidden' },
        h('div', { className: 'absolute inset-0 bg-gradient-to-br from-primary-50 via-white to-accent-50/30' }),
        h('div', { className: 'absolute top-20 right-0 w-96 h-96 bg-primary-100/40 rounded-full blur-3xl' }),
        h('div', { className: 'absolute bottom-0 left-0 w-80 h-80 bg-accent-100/30 rounded-full blur-3xl' }),
        h('div', { className: 'relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' },
          h('div', { className: 'text-center max-w-3xl mx-auto' },
            h('div', { className: 'inline-flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-sm border border-gray-100 mb-6' },
              h('span', { className: 'w-2 h-2 bg-green-500 rounded-full animate-pulse' }),
              h('span', { className: 'text-sm text-gray-600' }, '已有 ',
                h('span', { className: 'font-semibold text-primary-600' }, '12,840+'),
                ' 位学生在此找到理想导师')
            ),
            h('h1', { className: 'text-4xl sm:text-5xl lg:text-6xl font-extrabold text-gray-900 leading-tight mb-6' },
              '为你匹配最合适的', h('br'),
              h('span', { className: 'bg-gradient-to-r from-primary-600 to-accent-500 bg-clip-text text-transparent' }, '提分导师')
            ),
            h('p', { className: 'text-lg text-gray-500 mb-10 max-w-2xl mx-auto leading-relaxed' },
              '覆盖全科目、全学段，严选名校师资，AI智能匹配，让每一次辅导都精准高效'
            ),
            h('div', { className: 'flex flex-col sm:flex-row gap-3 max-w-xl mx-auto' },
              h('div', { className: 'flex-1 relative' },
                h('div', { className: 'absolute left-4 top-1/2 -translate-y-1/2 text-gray-400' }, h(SearchIcon)),
                h('input', { type: 'text', value: searchText, onChange: function(e) { setSearchText(e.target.value); }, onKeyDown: handleKeyDown,
                  placeholder: user ? '输入科目如"数学""物理""英语""理科"...' : '请先登录后再搜索导师',
                  className: 'w-full pl-12 pr-4 py-4 border border-gray-200 rounded-xl outline-none focus:border-primary-500 focus:ring-4 focus:ring-primary-100 transition-all text-gray-700 shadow-sm' })
              ),
              h('button', { onClick: handleSearch, className: 'px-8 py-4 bg-accent-500 text-white font-semibold rounded-xl hover:bg-accent-600 transition-all hover:shadow-xl hover:shadow-accent-200 active:scale-[0.98] whitespace-nowrap' }, user ? '立即搜索' : '登录后搜索')
            ),
            h('div', { className: 'flex flex-wrap justify-center gap-3 mt-6' },
              quickTags.map(function(tag) {
                return h('span', { key: tag.keyword, onClick: function() {
                  var el = document.getElementById('tutors');
                  if (el) el.scrollIntoView({ behavior: 'smooth' });
                  if (onSearch) onSearch(tag.keyword);
                }, className: 'px-4 py-2 bg-white text-gray-600 text-sm rounded-lg border border-gray-200 hover:border-primary-300 hover:text-primary-600 hover:bg-primary-50 cursor-pointer transition-all shadow-sm' }, tag.label);
              })
            )
          )
        )
      );
    }

    // ─── 判断导师学段 ───
    function getGradeLevel(tutor) {
      var text = (tutor.intro || '') + ' ' + (tutor.tags || []).join(' ');
      if (text.indexOf('小学') !== -1 || text.indexOf('小升初') !== -1) return '小学';
      if (text.indexOf('初中') !== -1 || text.indexOf('中考') !== -1 || text.indexOf('初三') !== -1) return '初中';
      if (text.indexOf('高中') !== -1 || text.indexOf('高考') !== -1 || text.indexOf('高三') !== -1) return '高中';
      // 默认根据年级关键词推断
      if (text.indexOf('初一') !== -1 || text.indexOf('初二') !== -1) return '初中';
      if (text.indexOf('高一') !== -1 || text.indexOf('高二') !== -1) return '高中';
      return '全部'; // 无法判断
    }

    // ─── Filter Section ───
    function FilterSection(props) {
      var onBookClick = props.onBookClick;
      var tutors = props.tutors;
      var loading = props.loading;
      var searchSubject = props.searchSubject;
      var user = props.user;

      var activeState = useState(searchSubject || '全部');
      var activeSubject = activeState[0];
      var setActiveSubject = activeState[1];

      var gradeState = useState('全部');
      var activeGrade = gradeState[0];
      var setActiveGrade = gradeState[1];

      // 同步外部搜索
      useEffect(function() {
        if (searchSubject !== undefined && searchSubject !== null) {
          setActiveSubject(searchSubject);
        }
      }, [searchSubject]);

      // 过滤逻辑：科目 + 学段
      var filtered = tutors;
      // 科目过滤
      if (activeSubject && activeSubject !== '全部') {
        if (Array.isArray(activeSubject)) {
          filtered = filtered.filter(function(t) { return activeSubject.indexOf(t.subject) !== -1; });
        } else {
          filtered = filtered.filter(function(t) { return t.subject === activeSubject; });
        }
      }
      // 学段过滤
      if (activeGrade && activeGrade !== '全部') {
        filtered = filtered.filter(function(t) { return getGradeLevel(t) === activeGrade || getGradeLevel(t) === '全部'; });
      }

      var displaySubject = Array.isArray(activeSubject) ? '理科' : activeSubject;

      return h('section', { id: 'tutors', className: 'py-20 bg-white' },
        h('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' },
          h('div', { className: 'text-center mb-12' },
            h('h2', { className: 'text-3xl lg:text-4xl font-bold text-gray-900 mb-3' }, '严选优质导师'),
            h('p', { className: 'text-gray-500 max-w-lg mx-auto' }, '每位导师均经过严格筛选，确保教学质量与学习体验')
          ),
          // 学段筛选（移动端可横向滑动）
          h('div', { className: 'flex justify-start md:justify-center gap-2 mb-4 overflow-x-auto pb-2 -mx-4 px-4 md:mx-0 md:px-0 flex-wrap md:flex-nowrap' },
            h('span', { className: 'text-xs text-gray-400 self-center mr-1 font-medium whitespace-nowrap' }, '学段'),
            GRADE_LEVELS.map(function(grade) {
              return h('button', { key: grade, onClick: function() { setActiveGrade(grade); },
                className: 'px-4 py-2.5 rounded-xl text-sm font-medium transition-all whitespace-nowrap flex-shrink-0 ' +
                  (activeGrade === grade
                    ? 'bg-accent-500 text-white shadow-lg shadow-accent-200'
                    : 'bg-gray-50 text-gray-600 hover:bg-gray-100 border border-gray-100 active:bg-gray-200') }, grade);
            })
          ),
          // 科目筛选（移动端可横向滑动）
          h('div', { className: 'flex justify-start md:justify-center gap-2 mb-10 overflow-x-auto pb-2 -mx-4 px-4 md:mx-0 md:px-0 flex-wrap md:flex-nowrap' },
            h('span', { className: 'text-xs text-gray-400 self-center mr-1 font-medium whitespace-nowrap' }, '科目'),
            SUBJECTS.map(function(subject) {
              return h('button', { key: subject, onClick: function() { setActiveSubject(subject); },
                className: 'px-4 py-2.5 rounded-xl text-sm font-medium transition-all whitespace-nowrap flex-shrink-0 ' +
                  (activeSubject === subject
                    ? 'bg-primary-600 text-white shadow-lg shadow-primary-200'
                    : 'bg-gray-50 text-gray-600 hover:bg-gray-100 border border-gray-100 active:bg-gray-200') }, subject);
            })
          ),
          loading ? h('div', { className: 'text-center py-16' },
            h('div', { className: 'flex items-center justify-center gap-3 text-gray-400' },
              h(LoadingIcon),
              h('span', null, '加载导师数据中...')
            )
          ) : filtered.length === 0 ? h('div', { className: 'text-center py-16 text-gray-400' },
            h('p', { className: 'text-lg' }, '暂无该条件的导师数据'),
            h('p', { className: 'text-sm mt-2' }, '试试调整筛选条件或搜索其他关键词')
          ) : h('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6' },
            filtered.map(function(tutor) {
              return h(TutorCard, { key: tutor.id, tutor: tutor, onBook: onBookClick, user: user });
            })
          )
        )
      );
    }

    // ─── Features Section ───
    function FeaturesSection() {
      return h('section', { className: 'py-20 bg-gray-50' },
        h('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' },
          h('div', { className: 'text-center mb-12' },
            h('h2', { className: 'text-3xl lg:text-4xl font-bold text-gray-900 mb-3' }, '为什么选择优学帮'),
            h('p', { className: 'text-gray-500 max-w-lg mx-auto' }, '三大核心优势，让学习效果看得见')
          ),
          h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-8' },
            FEATURES.map(function(f, i) {
              return h('div', { key: i, className: 'group bg-white p-8 rounded-2xl border border-gray-100 hover:shadow-xl hover:shadow-primary-100/50 transition-all duration-300 hover:-translate-y-2 cursor-default' },
                h('div', { className: 'w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-50 to-primary-100 flex items-center justify-center text-3xl mb-6 group-hover:scale-110 transition-transform duration-300' }, f.icon),
                h('h3', { className: 'text-xl font-bold text-gray-900 mb-3' }, f.title),
                h('p', { className: 'text-gray-500 leading-relaxed' }, f.desc)
              );
            })
          )
        )
      );
    }

    // ─── Stats ───
    function StatsSection() {
      var stats = [
        { value: '12,840+', label: '注册学生' },
        { value: '860+', label: '认证导师' },
        { value: '98.7%', label: '满意度' },
        { value: '156万+', label: '授课课时' },
      ];
      return h('section', { className: 'py-16 bg-gradient-to-r from-primary-600 to-primary-800' },
        h('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' },
          h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-8' },
            stats.map(function(s, i) {
              return h('div', { key: i, className: 'text-center' },
                h('div', { className: 'text-3xl lg:text-4xl font-extrabold text-white mb-1' }, s.value),
                h('div', { className: 'text-primary-200 text-sm' }, s.label)
              );
            })
          )
        )
      );
    }

    // ─── Footer ───
    function Footer() {
      var links = {
        '平台服务': ['找导师', '课程分类', '学习测评', '学习报告'],
        '关于我们': ['公司介绍', '加入我们', '联系方式', '合作伙伴'],
        '帮助中心': ['常见问题', '使用指南', '隐私政策', '服务条款'],
      };
      return h('footer', { className: 'bg-gray-900 text-gray-400 pt-16 pb-8' },
        h('div', { className: 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8' },
          h('div', { className: 'grid grid-cols-1 md:grid-cols-4 gap-12 mb-12' },
            h('div', null,
              h('div', { className: 'flex items-center gap-2 mb-4' },
                h('div', { className: 'w-9 h-9 rounded-xl bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center' },
                  h('span', { className: 'text-white font-bold text-lg' }, '优')
                ),
                h('span', { className: 'text-xl font-bold text-white' }, '优学帮')
              ),
              h('p', { className: 'text-sm leading-relaxed' }, '让每个学生都能找到最适合的导师，让优质教育触手可及。')
            ),
            Object.entries(links).map(function(entry) {
              var title = entry[0];
              var items = entry[1];
              return h('div', { key: title },
                h('h4', { className: 'text-white font-semibold mb-4' }, title),
                h('ul', { className: 'space-y-2.5' },
                  items.map(function(item) {
                    return h('li', { key: item }, h('a', { href: '#', className: 'text-sm hover:text-white transition-colors' }, item));
                  })
                )
              );
            })
          ),
          h('div', { className: 'border-t border-gray-800 pt-8 flex flex-col md:flex-row justify-between items-center gap-4' },
            h('p', { className: 'text-sm' }, '© 2026 优学帮 All rights reserved.'),
            h('div', { className: 'flex gap-6' },
              h('a', { href: '#', className: 'text-sm hover:text-white transition-colors' }, '隐私政策'),
              h('a', { href: '#', className: 'text-sm hover:text-white transition-colors' }, '服务条款')
            )
          )
        )
      );
    }

    // ─── App ───
    function App() {
      var modalState = useState(false);
      var modalOpen = modalState[0];
      var setModalOpen = modalState[1];

      var tutorState = useState(null);
      var selectedTutor = tutorState[0];
      var setSelectedTutor = tutorState[1];

      var paymentState = useState(false);
      var paymentOpen = paymentState[0];
      var setPaymentOpen = paymentState[1];

      var bookingInfoState = useState(null);
      var bookingInfo = bookingInfoState[0];
      var setBookingInfo = bookingInfoState[1];

      // 顾客登录状态
      var userState = useState(null);
      var user = userState[0];
      var setUser = userState[1];

      var authModalState = useState(false);
      var authModalOpen = authModalState[0];
      var setAuthModalOpen = authModalState[1];

      var bookingsModalState = useState(false);
      var bookingsModalOpen = bookingsModalState[0];
      var setBookingsModalOpen = bookingsModalState[1];

      var authCheckingState = useState(true);
      var authChecking = authCheckingState[0];
      var setAuthChecking = authCheckingState[1];

      // 从 Supabase 加载导师数据
      var tutorsState = useState([]);
      var tutors = tutorsState[0];
      var setTutors = tutorsState[1];

      var loadingState = useState(true);
      var loading = loadingState[0];
      var setLoading = loadingState[1];

      useEffect(function() {
        async function loadTutors() {
          try {
            var result = await supabase
              .from('tutors')
              .select('*')
              .eq('status', 'active')
              .order('rating', { ascending: false });

            if (result.data) {
              setTutors(result.data);
            }
          } catch (err) {
            console.log('加载导师数据失败:', err);
          }
          setLoading(false);
        }

        async function checkSession() {
          try {
            var result = await supabase.auth.getSession();
            if (result.data && result.data.session) {
              setUser(result.data.session.user);
            }
          } catch (err) {
            // 未登录
          }
        }

        loadTutors();
        checkSession();
      }, []);

      // 搜索关键词
      var searchSubjectState = useState('全部');
      var searchSubject = searchSubjectState[0];
      var setSearchSubject = searchSubjectState[1];

      var handleBook = function(tutor) {
        if (!user) { setAuthModalOpen(true); return; }
        setSelectedTutor(tutor || null);
        setModalOpen(true);
      };

      var handleBookingSuccess = function(info) {
        setBookingInfo(info);
        setPaymentOpen(true);
      };

      var handleSearch = function(subject) {
        if (!user) { setAuthModalOpen(true); return; }
        setSearchSubject(subject);
      };

      var handleLogout = async function() {
        await supabase.auth.signOut();
        setUser(null);
      };

      return h('div', { className: 'min-h-screen' },
        h(Header, {
          onBookClick: function() { handleBook(null); },
          user: user,
          onLoginSuccess: function(u) { setUser(u); },
          onMyBookingsClick: function() { setBookingsModalOpen(true); },
          onLogout: handleLogout
        }),
        h(HeroSection, { onBookClick: function() { handleBook(null); }, onSearch: handleSearch, user: user }),
        h(FilterSection, { onBookClick: handleBook, tutors: tutors, loading: loading, searchSubject: searchSubject, user: user }),
        h(StatsSection),
        h(FeaturesSection),
        h(Footer),
        h(BookingModal, { isOpen: modalOpen, onClose: function() { setModalOpen(false); }, tutor: selectedTutor, onBookingSuccess: handleBookingSuccess }),
        h(PaymentModal, { isOpen: paymentOpen, onClose: function() { setPaymentOpen(false); }, bookingInfo: bookingInfo }),
        h(MyBookingsModal, { isOpen: bookingsModalOpen, onClose: function() { setBookingsModalOpen(false); }, user: user })
      );
    }

    var root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
